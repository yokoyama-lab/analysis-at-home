name: verify
# Type-checks the seed Rocq statement only. No LLM calls, no secrets.
on:
  push:
  pull_request:

jobs:
  rocq-seed:
    runs-on: ubuntu-latest
    # checkout runs on the host; docker-coq-action mounts the workspace and runs
    # coqc inside the coq container with the opam env loaded (avoids the
    # non-root EACCES issue of running checkout inside coqorg/coq directly).
    steps:
      - uses: actions/checkout@v4
      - uses: coq-community/docker-coq-action@v1
        with:
          coq_version: "8.18"
          custom_script: |
            startGroup "coqc func-ops seed"
              ( cd work-units/insertion-sort-comparisons/targets/rocq && coqc -q InsertionSortComparisons.v )
            endGroup
            startGroup "coqc while-ops seed"
              ( cd work-units/insertion-sort-comparisons-while/targets/rocq && coqc -q InsertionSortWhileComparisons.v )
            endGroup

  coordinator-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: coordinator
        run: |
          npm install
          npm run typecheck
