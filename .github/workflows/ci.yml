name: verify
# Type-checks the seed Rocq statement only. No LLM calls, no secrets.
on:
  push:
  pull_request:

jobs:
  rocq-seed:
    runs-on: ubuntu-latest
    # checkout runs on the host; docker-coq-action mounts the workspace and runs
    # coqc inside the coq container with the opam env loaded (avoids the
    # non-root EACCES issue of running checkout inside coqorg/coq directly).
    steps:
      - uses: actions/checkout@v4
      - uses: coq-community/docker-coq-action@v1
        with:
          coq_version: "8.18"
          custom_script: |
            ws="$PWD"
            startGroup "type-check seeds"
              # Compile in a writable temp dir: the mounted workspace is
              # host-owned, so coqc (running as user `coq`) cannot write its
              # .vo/.glob next to the sources. The seeds are self-contained.
              d="$(mktemp -d)"
              cp work-units/insertion-sort-comparisons/targets/rocq/InsertionSortComparisons.v "$d/"
              cp work-units/insertion-sort-comparisons-while/targets/rocq/InsertionSortWhileComparisons.v "$d/"
              ( cd "$d" && coqc -q InsertionSortComparisons.v && coqc -q InsertionSortWhileComparisons.v )
            endGroup
            startGroup "certify the decomposed (leaf) proof"
              # assemble.sh resolves its own dir and compiles in a temp dir.
              bash "$ws/work-units/insertion-sort-comparisons-while/decomposition/assemble.sh"
            endGroup

  coordinator-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: coordinator
        run: |
          npm install
          npm run typecheck
