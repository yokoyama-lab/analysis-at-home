name: verify-submissions
# On every PR, kernel-check the proof targets it adds or changes, so "anyone can
# contribute" stays trustless: a PR only goes green if the kernel accepts the
# submission AND it proves the same statement as the base (signature-lock, see
# tools/verify_changed.sh + tools/signature_lock.sh). rocq runs in the coq
# container; lean/agda/isabelle install a pinned toolchain only when the PR
# actually touches that backend (the install steps are gated on a changed-files
# check, so ordinary PRs stay fast). Bump the pinned toolchain versions below as
# the project's local toolchains move.
on:
  pull_request:

jobs:
  rocq:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
      - uses: coq-community/docker-coq-action@v1
        with:
          coq_version: "8.18"
          custom_script: |
            startGroup "verify changed rocq targets"
              bash tools/verify_changed.sh "origin/${{ github.base_ref }}" rocq
            endGroup

  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
      - name: any changed lean targets?
        id: c
        run: |
          n=$(git diff --name-only --diff-filter=AM "origin/${{ github.base_ref }}...HEAD" \
                | grep -Ec '^work-units/.+/targets/lean/.+\.lean$' || true)
          echo "n=$n" >> "$GITHUB_OUTPUT"
      - if: steps.c.outputs.n != '0'
        name: install Lean (elan, pinned) and warm up the toolchain
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/elan" toolchain install leanprover/lean4:v4.30.0
          "$HOME/.elan/bin/elan" default leanprover/lean4:v4.30.0
          "$HOME/.elan/bin/lean" --version
      - if: steps.c.outputs.n != '0'
        run: bash tools/verify_changed.sh "origin/${{ github.base_ref }}" lean

  agda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
      - name: any changed agda targets?
        id: c
        run: |
          n=$(git diff --name-only --diff-filter=AM "origin/${{ github.base_ref }}...HEAD" \
                | grep -Ec '^work-units/.+/targets/agda/.+\.agda$' || true)
          echo "n=$n" >> "$GITHUB_OUTPUT"
      - if: steps.c.outputs.n != '0'
        name: install Agda + agda-stdlib (pinned)
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: "2.8.0"
          agda-stdlib-version: "recommended"
      - if: steps.c.outputs.n != '0'
        run: bash tools/verify_changed.sh "origin/${{ github.base_ref }}" agda

  isabelle:
    runs-on: ubuntu-latest
    env:
      ISABELLE_VERSION: Isabelle2025
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
      - name: any changed isabelle targets?
        id: c
        run: |
          n=$(git diff --name-only --diff-filter=AM "origin/${{ github.base_ref }}...HEAD" \
                | grep -Ec '^work-units/.+/targets/isabelle/.+\.thy$' || true)
          echo "n=$n" >> "$GITHUB_OUTPUT"
      - if: steps.c.outputs.n != '0'
        name: install Isabelle (pinned; ships a prebuilt HOL heap)
        run: |
          curl -fsSL "https://isabelle.in.tum.de/dist/${ISABELLE_VERSION}_linux.tar.gz" \
            -o isabelle.tar.gz
          tar xzf isabelle.tar.gz
          echo "$PWD/${ISABELLE_VERSION}/bin" >> "$GITHUB_PATH"
      - if: steps.c.outputs.n != '0'
        run: |
          isabelle version
          bash tools/verify_changed.sh "origin/${{ github.base_ref }}" isabelle

  # Conjecture track: a "computed, not trusted" result is still only accepted if
  # it REPRODUCES from the committed solver. When a PR touches tools/conjecture/,
  # re-run conjecture.py and reject any drift in results/*.json.
  conjecture-reproducible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
      - name: any changed conjecture-track files?
        id: c
        run: |
          n=$(git diff --name-only --diff-filter=AMD "origin/${{ github.base_ref }}...HEAD" \
                | grep -Ec '^tools/conjecture/' || true)
          echo "n=$n" >> "$GITHUB_OUTPUT"
      - if: steps.c.outputs.n != '0'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - if: steps.c.outputs.n != '0'
        run: bash tools/check_conjecture_reproducible.sh

  # Faithfulness oracle: a unit's formal average-case mean p/q must match the
  # INDEPENDENTLY ENUMERATED E[cost] in its conjecture-track artifact. Cheap
  # (pure stdlib), so it runs on every PR.
  oracle-faithful:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 tools/oracle_check.py
